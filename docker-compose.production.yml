# Production-ready Docker Compose for LingoLinq AAC
services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: lingolinq_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lingolinq_production}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: lingolinq_redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - app_network

  # Rails Backend
  web:
    build:
      context: .
      dockerfile: Dockerfile.backend.fixed
    container_name: lingolinq_web
    ports:
      - "${PORT:-3000}:3000"
    environment:
      RAILS_ENV: ${RAILS_ENV:-production}
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-lingolinq_production}
      REDIS_URL: redis://redis:6379/0
      RAILS_SERVE_STATIC_FILES: "true"
      RAILS_LOG_TO_STDOUT: "true"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      bash -c "
        echo '🚀 Starting LingoLinq AAC...' &&
        echo 'Ruby: $(ruby -v)' &&
        echo 'Node: $(node -v)' &&
        echo 'Rails: $(bundle exec rails -v)' &&
        bundle exec rails extras:assert_js &&
        bundle exec rails db:create db:migrate &&
        if [ \"$$RAILS_ENV\" = \"development\" ]; then
          bundle exec rails db:seed
        fi &&
        bundle exec rails server -b 0.0.0.0 -p 3000
      "
    networks:
      - app_network

  # Background Jobs (Resque workers)
  worker:
    build:
      context: .
      dockerfile: Dockerfile.backend.fixed
    container_name: lingolinq_worker
    environment:
      RAILS_ENV: ${RAILS_ENV:-production}
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-lingolinq_production}
      REDIS_URL: redis://redis:6379/0
      QUEUES: priority,default,slow
      INTERVAL: 5
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: bundle exec rake environment resque:work
    networks:
      - app_network

volumes:
  postgres_data:
  redis_data:

networks:
  app_network:
    driver: bridge