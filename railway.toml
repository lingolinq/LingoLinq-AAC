[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile.temp"

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "on_failure"

[env]
RAILS_ENV = "production"
RACK_ENV = "production"
RAILS_SERVE_STATIC_FILES = "true"
RAILS_LOG_TO_STDOUT = "true"
DISABLE_OBF_GEM = "true"
NODE_ENV = "production"