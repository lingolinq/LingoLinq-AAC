<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Maintenance - LingoLinq</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Lexend", "Nunito Sans", system-ui, -apple-system, sans-serif;
      background: #eef1f6;
      color: #111a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: rgba(255,255,255,0.88);
      border-bottom: 1px solid rgba(17,26,46,0.10);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    header img { height: 40px; }
    header span {
      font-size: 22px;
      font-weight: 700;
      color: #1B365D;
      letter-spacing: -0.3px;
    }
    header a { text-decoration: none; display: flex; align-items: center; gap: 10px; }
    main {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 20px 24px;
    }
    .error-card {
      background: rgba(255,255,255,0.76);
      border: 1px solid rgba(17,26,46,0.10);
      border-radius: 28px;
      box-shadow: 0 18px 50px rgba(17,26,46,0.12);
      padding: 48px;
      max-width: 600px;
      width: 100%;
      text-align: center;
    }
    .error-card__top {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 24px;
    }
    .error-card__top img {
      width: 180px;
      height: auto;
      flex-shrink: 0;
    }
    .error-code {
      display: inline-block;
      background: rgba(44,183,176,0.18);
      color: #2cb7b0;
      font-size: 18px;
      font-weight: 700;
      padding: 4px 14px;
      border-radius: 20px;
    }
    .error-card h1 {
      font-size: 32px;
      font-weight: 800;
      color: #1B365D;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }
    .error-card p {
      font-size: 17px;
      line-height: 1.6;
      color: #46505F;
      margin-bottom: 16px;
    }
    .error-card p.report {
      font-size: 15px;
      color: #7389A3;
      margin-bottom: 28px;
    }
    .error-card a.btn {
      display: inline-block;
      background: #316f70;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      padding: 12px 32px;
      border-radius: 50px;
      text-decoration: none;
      box-shadow: 0 4px 12px rgba(49,111,112,0.3);
      transition: background 0.2s, box-shadow 0.2s;
    }
    .error-card a.btn:hover {
      background: #285b5c;
      box-shadow: 0 6px 20px rgba(49,111,112,0.4);
    }
    footer {
      padding: 20px 24px;
      text-align: center;
      font-size: 18px;
      color: #7389A3;
    }
    footer a { color: #316f70; text-decoration: none; font-size: 18px; }
    footer a:hover { text-decoration: underline; }
    @media (max-width: 640px) {
      .error-card { padding: 32px 24px; border-radius: 20px; }
      .error-card__top { flex-direction: column; gap: 12px; }
      .error-card__top img { width: 140px; }
      .error-card h1 { font-size: 26px; }
    }
  </style>
</head>
<body>
  <header>
    <a href="/">
      <img src="/images/LL_Logo_Light_Muted.png" alt="LingoLinq logo">
      <span>LingoLinq</span>
    </a>
  </header>
  <main>
    <div class="error-card">
      <div class="error-card__top">
        <img src="/images/not-found.png" alt="Maintenance illustration">
        <div class="error-code">Maintenance</div>
      </div>
      <h1>Closed for Repairs</h1>
      <p>
        Sorry we had to shut things down for a few minutes. There is either
        something that needs to be fixed or a big upgrade happening.
        We should be back up shortly.
      </p>
      <a class="btn" href="/">Try Again</a>
    </div>
  </main>
  <footer>
    LingoLinq &middot; <a href="/">Home</a>
  </footer>
</body>
</html>
