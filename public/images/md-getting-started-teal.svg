<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Getting Started icon - light teal dominant for modern dashboard -->
  <defs>
    <!-- Clipboard body - light teal gradient (dominant) -->
    <linearGradient id="tealClipBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E9F9F8"/>
      <stop offset="40%" style="stop-color:#B8E6E3"/>
      <stop offset="100%" style="stop-color:#7DD3CF"/>
    </linearGradient>
    <!-- Clip bar - medium teal -->
    <linearGradient id="tealClipBar" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7DD3CF"/>
      <stop offset="50%" style="stop-color:#5EC4C0"/>
      <stop offset="100%" style="stop-color:#2CB7B0"/>
    </linearGradient>
    <!-- Gloss highlight -->
    <linearGradient id="tealGloss" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.5)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
    <!-- Checkmark circle - slightly darker teal for contrast -->
    <linearGradient id="tealCheck" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5EC4C0"/>
      <stop offset="100%" style="stop-color:#2CB7B0"/>
    </linearGradient>
  </defs>
  <!-- Clipboard body - light teal -->
  <rect x="14" y="22" width="52" height="52" rx="6" ry="6" fill="url(#tealClipBase)" stroke="#9DD9D6" stroke-width="1"/>
  <!-- Clip bar at top -->
  <rect x="28" y="12" width="24" height="14" rx="3" ry="3" fill="url(#tealClipBar)" stroke="#2CB7B0" stroke-width="0.5"/>
  <rect x="30" y="14" width="20" height="10" rx="2" ry="2" fill="url(#tealGloss)" opacity="0.35"/>
  <!-- Checklist lines - soft teal-grey -->
  <rect x="22" y="34" width="20" height="3" rx="1.5" fill="#9DD9D6"/>
  <rect x="22" y="42" width="24" height="3" rx="1.5" fill="#9DD9D6"/>
  <rect x="22" y="50" width="18" height="3" rx="1.5" fill="#9DD9D6"/>
  <!-- Checkmark circle -->
  <circle cx="52" cy="36" r="10" fill="url(#tealCheck)" stroke="#2CB7B0" stroke-width="0.5"/>
  <path d="M47 36 L50 39 L58 31" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Subtle shadow -->
  <ellipse cx="40" cy="76" rx="28" ry="4" fill="rgba(44,183,176,0.12)"/>
</svg>
