<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- Universal language icon: globe with "A" - matches LingoLinq bento color scheme -->
  <defs>
    <linearGradient id="globeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7b8cff"/>
      <stop offset="100%" style="stop-color:#5a6bdd"/>
    </linearGradient>
  </defs>
  <!-- Globe circle -->
  <circle cx="12" cy="12" r="10" fill="none" stroke="url(#globeGrad)" stroke-width="1.5"/>
  <!-- Latitude lines -->
  <ellipse cx="12" cy="12" rx="10" ry="3.5" fill="none" stroke="url(#globeGrad)" stroke-width="1" opacity="0.9"/>
  <ellipse cx="12" cy="12" rx="10" ry="3.5" fill="none" stroke="url(#globeGrad)" stroke-width="1" opacity="0.9" transform="rotate(90 12 12)"/>
  <!-- Vertical center line -->
  <line x1="12" y1="2" x2="12" y2="22" stroke="url(#globeGrad)" stroke-width="1" opacity="0.8"/>
  <!-- "A" for language/translation - universally recognized symbol (Google Translate style) -->
  <text x="12" y="16.5" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#7b8cff" text-anchor="middle">A</text>
</svg>
