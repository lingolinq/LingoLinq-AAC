# NUCLEAR Cache Breaking Fly.io Configuration
# Use entirely new app name to guarantee zero cache

app = "lingolinq-aac-nuclear"  # NEW APP NAME
primary_region = "ord"

[build]
  dockerfile = "Dockerfile.nuclear"
  
  # CACHE BREAKING BUILD ARGS  
  [build.args]
    CACHE_BREAK_TIMESTAMP = "{{timestamp}}"
    BUILD_ID = "nuclear-{{timestamp}}"

[env]
  # Rails environment
  RAILS_ENV = "production"
  RACK_ENV = "production"
  RAILS_SERVE_STATIC_FILES = "true"
  RAILS_LOG_TO_STDOUT = "true"
  
  # NUCLEAR CACHE BREAKING
  NUCLEAR_BUILD_VERSION = "v2"
  FORCE_COMPLETE_REBUILD = "true"
  CACHE_BREAK_TIMESTAMP = "{{timestamp}}"
  
  # Bundle configuration (FIXED)
  BUNDLE_DEPLOYMENT = "false"
  BUNDLE_PATH = "/usr/local/bundle"
  BUNDLE_FORCE_RUBY_PLATFORM = "true"
  
  # App configuration
  DEFAULT_EMAIL_FROM = "noreply@lingolinq.com"
  SYSTEM_ERROR_EMAIL = "errors@lingolinq.com"
  NEW_REGISTRATION_EMAIL = "registrations@lingolinq.com"
  
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

# Extended health check for nuclear build
[[http_service.checks]]
  grace_period = "120s"  # Longer for nuclear rebuild
  interval = "30s"
  method = "GET"
  timeout = "15s"
  path = "/health"

[http_service.concurrency]
  type = "requests"
  hard_limit = 100
  soft_limit = 50

# Increased resources for nuclear build
[[vm]]
  memory = "2gb"  # More memory for complete rebuild
  cpu_kind = "shared"
  cpus = 2       # More CPU for faster build

[processes]
  app = "./bin/docker-start.sh"

# INSTRUCTIONS FOR NUCLEAR DEPLOYMENT:
# 1. Destroy existing app: fly apps destroy lingolinq-aac
# 2. Deploy with new name: fly launch --config fly-nuclear.toml
# 3. Set secrets: fly secrets set RAILS_MASTER_KEY=...
# 4. Deploy: fly deploy --config fly-nuclear.toml --dockerfile Dockerfile.nuclear