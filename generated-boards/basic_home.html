<!DOCTYPE html>

  <style>
    body {

      padding: 20px;

    }
    .board-container {
      background: rgb(125, 125, 125);
      box-shadow: 5px 5px 10px rgb(125, 125, 125), -5px -5px 10px rgb(125, 125, 125);
      width: 350px;
      height: 450px;
      position: relative;
      margin: 0 auto;

    .board-header {

      border-bottom: 2px solid #ccc;

    }

    }
    .button:hover {

      transition: all 0.2s;

  </style>
</head>

  <script>
    // Wait for all images to load before signaling ready
    let loadedImages = 0;
    const images = document.querySelectorAll('img');
    const totalImages = images.length;

    images.forEach(img => {
      if (img.complete) {
        loadedImages++;
      } else {
        img.addEventListener('load', () => {
          loadedImages++;
          if (loadedImages === totalImages) {
            document.body.setAttribute('data-images-loaded', 'true');
          }
        });
        img.addEventListener('error', () => {
          loadedImages++;
          if (loadedImages === totalImages) {
            document.body.setAttribute('data-images-loaded', 'true');
          }
        });
      }
    });

    if (loadedImages === totalImages) {
      document.body.setAttribute('data-images-loaded', 'true');
    }
  </script>
