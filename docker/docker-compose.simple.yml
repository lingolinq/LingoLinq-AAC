services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: lingolinq_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: lingolinq_development
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - lingolinq_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: lingolinq_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - lingolinq_network

  # Rails Backend (local development)
  backend:
    image: ruby:3.2.8-slim
    container_name: lingolinq_backend_dev
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
    environment:
      - RAILS_ENV=development
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgres://postgres:password@postgres:5432/lingolinq_development
      - BUNDLE_PATH=/usr/local/bundle
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      bash -c "
        apt-get update && apt-get install -y build-essential libpq-dev git nodejs npm curl &&
        curl -fsSL https://deb.nodesource.com/setup_18.x | bash - &&
        apt-get install -y nodejs &&
        echo '✅ Ruby: $(ruby -v)' &&
        echo '✅ Node: $(node -v)' &&
        gem install bundler &&
        bundle install &&
        rails extras:assert_js &&
        rails db:create || true &&
        rails db:migrate &&
        rails db:seed || true &&
        bundle exec rails server -b 0.0.0.0
      "
    networks:
      - lingolinq_network

volumes:
  postgres_data:
  redis_data:
  bundle_cache:

networks:
  lingolinq_network:
    driver: bridge