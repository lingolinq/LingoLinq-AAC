name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  rspec:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/lingolinq_test
      REDIS_URL: redis://localhost:6379/

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Setup assets (vendor.css, frontend.css symlinks)
        run: bundle exec rails extras:assert_js

      - name: Setup database
        run: |
          bundle exec rails db:create db:schema:load

      - name: Run RSpec
        run: bundle exec rspec

  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            app/frontend/node_modules
          key: ${{ runner.os }}-node20-${{ hashFiles('app/frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node20-

      - name: Install frontend dependencies
        working-directory: app/frontend
        run: npm install

      - name: Build Ember app
        working-directory: app/frontend
        run: npx ember build

      - name: Run Ember tests (Chrome Headless)
        working-directory: app/frontend
        run: npx ember test
