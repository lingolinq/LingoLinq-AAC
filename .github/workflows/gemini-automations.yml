# .github/workflows/gemini-automations.yml

name: 'Gemini Automations'

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

jobs:
  triage_issue:
    name: Triage New Issue
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Triage with Gemini
        uses: google-gemini/gemini-cli-github-action@v0
        with:
          api_key: ${{ secrets.GEMINI_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          command: |
            summarize and triage the following GitHub issue.
            Based on the title and description, suggest a primary category
            (e.g., 'Bug', 'Feature Request', 'Documentation', 'Question')
            and three potential labels (e.g., 'ui', 'backend', 'api', 'testing').
            Format your response as a GitHub comment.
          context: |
            Issue Title: "${{ github.event.issue.title }}"
            Issue Body: "${{ github.event.issue.body }}"

  review_pr:
    name: Review New Pull Request
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR Diff
        id: pr_diff
        run: |
          echo "diff_output<<EOF" >> $GITHUB_ENV
          echo "$(git diff ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }})" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Review with Gemini
        uses: google-gemini/gemini-cli-github-action@v0
        with:
          api_key: ${{ secrets.GEMINI_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          command: |
            Act as a senior software engineer and review the following pull request.
            Provide a brief summary of the changes.
            Check for potential bugs, style inconsistencies, or areas that need better documentation.
            Do not comment on minor stylistic issues.
            Format your response as a GitHub comment.
          context: |
            PR Title: "${{ github.event.pull_request.title }}"
            PR Body: "${{ github.event.pull_request.body }}"
            PR Diff:
            ```diff
            ${{ env.diff_output }}
            ```
