name: Sync Render Secrets from 1Password

# Hourly sync of environment variables from 1Password to Render services.
# Only runs if there are actual changes to apply.
#
# REQUIRED REPO SECRETS (Settings > Secrets and variables > Actions):
#   OP_RENDER_SYNC_TOKEN  -- 1Password service account token (read-only ideally)
#   RENDER_API_KEY        -- Render API key with write access
#   GOOGLE_CHAT_WEBHOOK   -- Google Chat webhook URL for notifications
#
# MANUAL TRIGGER:
#   gh workflow run sync-render-secrets.yml

on:
  schedule:
    # Every hour at :15 past the hour (UTC)
    - cron: '15 * * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run only (no changes applied)'
        type: boolean
        default: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout LingoLinq-AAC
        uses: actions/checkout@v4

      - name: Install 1Password CLI
        run: |
          curl -sS https://downloads.1password.com/linux/keys/1password.asc | \
            sudo gpg --batch --dearmor -o /usr/share/keyrings/1password-archive-keyring.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/1password-archive-keyring.gpg] \
            https://downloads.1password.com/linux/debian/amd64 stable main" | \
            sudo tee /etc/apt/sources.list.d/1password.list
          sudo apt update && sudo apt install -y 1password-cli
          op --version

      - name: Verify 1Password access
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_RENDER_SYNC_TOKEN }}
        run: |
          VAULTS=$(op vault list --format=json | jq -r '.[].name' | tr '\n' ',' | sed 's/,$//')
          echo "Accessible vaults: $VAULTS"
          if ! echo "$VAULTS" | grep -q "LingoLinq Admin"; then
            echo "::error::render-sync token cannot access LingoLinq Admin vault"
            exit 1
          fi

      - name: Run sync (dry-run)
        id: dryrun
        env:
          OP_RENDER_SYNC_TOKEN: ${{ secrets.OP_RENDER_SYNC_TOKEN }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          OUTPUT=$(node scripts/sync-render-env.js --source op 2>&1 || true)
          echo "$OUTPUT"
          echo "output<<EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # Detect if there are any changes
          if echo "$OUTPUT" | grep -qE "NEW \([0-9]+\)|CHANGED \([0-9]+\)"; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Apply changes to Render
        id: apply
        if: steps.dryrun.outputs.has_changes == 'true' && inputs.dry_run != true
        env:
          OP_RENDER_SYNC_TOKEN: ${{ secrets.OP_RENDER_SYNC_TOKEN }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          OUTPUT=$(node scripts/sync-render-env.js --source op --apply 2>&1)
          echo "$OUTPUT"
          echo "output<<EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Notify Google Chat -- changes applied
        if: steps.dryrun.outputs.has_changes == 'true' && inputs.dry_run != true && success()
        env:
          WEBHOOK_URL: ${{ secrets.GOOGLE_CHAT_WEBHOOK }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "No GOOGLE_CHAT_WEBHOOK configured, skipping notification"
            exit 0
          fi

          # Extract summary from apply output
          SUMMARY=$(echo "${{ steps.apply.outputs.output }}" | grep -E "pushed|ERROR" | head -20)
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -X POST -H "Content-Type: application/json" \
            -d "{
              \"text\": \"🔄 *Render secrets synced from 1Password*\n\n\`\`\`\n$SUMMARY\n\`\`\`\n\n<$RUN_URL|View run>\n\n_Senior devs running locally with op run -- your next app restart will pick up the new values._\"
            }" \
            "$WEBHOOK_URL"

      - name: Notify Google Chat -- sync failed
        if: failure()
        env:
          WEBHOOK_URL: ${{ secrets.GOOGLE_CHAT_WEBHOOK }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then exit 0; fi
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -X POST -H "Content-Type: application/json" \
            -d "{\"text\": \"❌ *Render secrets sync FAILED*\n\n<$RUN_URL|View logs>\n\nPlease investigate.\"}" \
            "$WEBHOOK_URL"

      - name: Summary
        if: always()
        run: |
          echo "## Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.dryrun.outputs.has_changes }}" == "true" ]; then
            if [ "${{ inputs.dry_run }}" == "true" ]; then
              echo "Changes detected but dry-run mode enabled. No changes applied." >> $GITHUB_STEP_SUMMARY
            else
              echo "Changes applied to Render services." >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "No changes needed -- Render is in sync with 1Password." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Dry-run output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.dryrun.outputs.output }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
