services:
  - type: web
    name: LingoLinq-AAC
    runtime: ruby
    plan: starter
    branch: functional-baseline
    buildCommand: |
      bundle install &&
      bundle exec rake extras:assert_js &&
      cd app/frontend &&
      npm install &&
      npx ember build --environment production &&
      cd ../.. &&
      bundle exec rake assets:precompile &&
      bundle exec rake assets:clean
    preDeployCommand: bundle exec rails db:migrate
    startCommand: bundle exec puma -C config/puma.rb
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RACK_ENV
        value: production
      - key: RAILS_MASTER_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: lingolinq-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: lingolinq-redis
          property: connectionString
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
      - key: DEFAULT_HOST
        value: lingolinq-aac.onrender.com
      - key: DEFAULT_EMAIL_FROM
        value: noreply@lingolinq-aac.onrender.com
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: SECURE_ENCRYPTION_KEY
        generateValue: true
      - key: SECURE_NONCE_KEY
        generateValue: true
      - key: COOKIE_KEY
        generateValue: true

databases:
  - name: lingolinq-db
    plan: free
    databaseName: lingolinq_production_jron
    user: lingolinq_production_jron_user

  - name: lingolinq-redis
    plan: free
