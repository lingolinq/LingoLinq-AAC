# LingoLinq-AAC: Docker Compose for Local Development
# This file is optimized for the "golden path" developer onboarding experience.
# It uses the canonical Dockerfile at the project root.

version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.singlestage
    ports:
      - "3000:3000"
    environment:
      # --- Rails Settings (aligned with production) ---
      - RAILS_ENV=production
      - RAILS_LOG_TO_STDOUT=true
      - RAILS_SERVE_STATIC_FILES=true
      - DATABASE_URL=postgresql://postgres:password@db:5432/lingolinq_development
      - REDIS_URL=redis://redis:6379/0
      # --- Application Secrets (safe for development) ---
      - SECRET_KEY_BASE=dummy_secret_key_base_for_development_env
      - SECURE_ENCRYPTION_KEY=dev_encryption_key_at_least_24_characters_long_enough
      - SECURE_NONCE_KEY=dev_nonce_key_at_least_24_characters_long_enough_too
      - COOKIE_KEY=dev_cookie_encryption_key_12345
      # --- Application Settings ---
      - DEFAULT_HOST=localhost:3000
      - USER_KEY=admin@example.com
      - DEFAULT_EMAIL_FROM=lingolinq@example.com
      - SYSTEM_ERROR_EMAIL=errors@example.com
      - NEW_REGISTRATION_EMAIL=registrations@example.com
      - RAILS_FORCE_SSL='false'
    depends_on:
      - db
      - redis
    volumes:
      # Mount the application code for live reloading
      - .:/app
      # Exclude node_modules and assets from the mount to prevent conflicts
      - /app/node_modules
      - /app/app/frontend/node_modules
      - /app/public/assets

  db:
    image: postgres:15
    environment:
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=lingolinq_development
      - POSTGRES_USER=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
