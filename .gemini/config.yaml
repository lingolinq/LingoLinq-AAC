# Gemini Code Assist configuration
# Docs: https://developers.google.com/gemini-code-assist/docs/customize-gemini-behavior-github

code_review:
  comment_severity_threshold: LOW
  max_review_comments: -1
  pull_request_opened:
    summary: true
    code_review: true
    help: false
    include_drafts: true

ignore_patterns:
  - "vendor/**"
  - "node_modules/**"
  - "tmp/**"
  - "log/**"
  - "public/assets/**"
  - "app/frontend/dist/**"
  - "*.min.js"
  - "*.min.css"
  - "package-lock.json"
  - "Gemfile.lock"
