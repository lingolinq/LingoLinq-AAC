<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>LingoLinq</title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="LingoLinq">

    {{content-for "head"}}

    <script>
      // Patch addEventListener before ANY library loads so touch events are
      // never passive. Chrome defaults touch listeners to passive which
      // prevents preventDefault() and causes console warnings during drag.
      (function() {
        var orig = EventTarget.prototype.addEventListener;
        var touch = {touchstart:1,touchmove:1,touchend:1,touchcancel:1};
        EventTarget.prototype.addEventListener = function(t, fn, opts) {
          if(touch[t]) {
            if(typeof opts === 'boolean') opts = {capture:opts, passive:false};
            else opts = Object.assign({}, opts||{}, {passive:false});
          }
          return orig.call(this, t, fn, opts);
        };
      })();
    </script>

    <link rel="icon" href="{{rootURL}}images/LL_Logo_Light_Muted.png?v=5" type="image/png" />
    <link rel="apple-touch-icon" href="{{rootURL}}images/LL_Logo_Light_Muted.png?v=5" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lexend:wght@400;500;600;700&family=Maitree:wght@400;500;600;700&family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <!-- Chart.js + Sankey plugin: load before vendor to avoid concatenation conflicts (Identifier 's' / define).
         SRI omitted: jsDelivr on-demand minification for Chart.js 4.x produces variable output, making integrity hashes unreliable. -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"
            crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-sankey@0.14.0/dist/chartjs-chart-sankey.min.js"
            crossorigin="anonymous"></script>

    <!-- Load globals (MAPS_KEY, etc.) from Rails; proxied in dev when using foreman -->
    <script src="/assets/globals.js"></script>

    <link rel="stylesheet" href="{{rootURL}}assets/vendor.css">
    <link rel="stylesheet" href="{{rootURL}}assets/frontend.css">

    {{content-for "head-footer"}}
  </head>
  <body>
    <!-- Ember mounts here. config has rootElement: '#ember-application-root'. App template renders #within_ember > header + #content (main outlet). Do not add wrappers inside this div or change its id, or app styles (#content, #within_ember, etc.) may not apply. -->
    <div id="ember-application-root">{{content-for "body"}}</div>

    <script src="{{rootURL}}assets/vendor.js"></script>
    <script src="{{rootURL}}assets/frontend.js"></script>

    <!-- When served by Ember dev server (not Rails), stub domain_settings then merge from Rails (proxy) so .env COPPA_* matches backend. -->
    <script>
      (function () {
        if (typeof window.domain_settings === 'undefined') {
          window.domain_settings = {
            app_name: 'LingoLinq',
            company_name: 'Someone',
            logo_url: '/images/LL_Logo_Line_Bright.png',
            full_domain: true,
            support_url: 'https://lingolinq.zendesk.com',
            domain: window.location.host || 'localhost'
          };
        }
        fetch('/api/v1/domain_settings', { credentials: 'same-origin' })
          .then(function (r) { return r.json(); })
          .then(function (data) {
            if (data && data.settings && typeof data.settings === 'object') {
              Object.assign(window.domain_settings, data.settings);
              window.dispatchEvent(new Event('lingolinq-domain-settings-sync'));
            }
          })
          .catch(function () { /* keep stub; e.g. backend not up yet */ });
      })();
    </script>

    {{content-for "body-footer"}}
  </body>
</html>
