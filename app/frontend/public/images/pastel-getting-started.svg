<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Getting Started icon - 3D glossy style matching pastel-house -->
  <defs>
    <!-- Clipboard body - white with subtle grey shadow -->
    <linearGradient id="clipboardBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="50%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e8ecf0"/>
    </linearGradient>
    <!-- Clip bar - blue-grey like house roof -->
    <linearGradient id="clipBar" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8b4c8"/>
      <stop offset="30%" style="stop-color:#8b9ab5"/>
      <stop offset="70%" style="stop-color:#7a8aa8"/>
      <stop offset="100%" style="stop-color:#6b7a98"/>
    </linearGradient>
    <!-- Gloss highlight -->
    <linearGradient id="gloss" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.5)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
    <!-- Checkmark - soft teal/blue -->
    <linearGradient id="checkGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5cb88a"/>
      <stop offset="100%" style="stop-color:#4ec5c8"/>
    </linearGradient>
  </defs>
  <!-- Clipboard body - rounded rect -->
  <rect x="14" y="22" width="52" height="52" rx="6" ry="6" fill="url(#clipboardBase)" stroke="#d0d8e4" stroke-width="1"/>
  <!-- Clip bar at top -->
  <rect x="28" y="12" width="24" height="14" rx="3" ry="3" fill="url(#clipBar)" stroke="#8b9ab5" stroke-width="0.5"/>
  <rect x="30" y="14" width="20" height="10" rx="2" ry="2" fill="url(#gloss)" opacity="0.4"/>
  <!-- Checklist lines -->
  <rect x="22" y="34" width="20" height="3" rx="1.5" fill="#c8d0dc"/>
  <rect x="22" y="42" width="24" height="3" rx="1.5" fill="#c8d0dc"/>
  <rect x="22" y="50" width="18" height="3" rx="1.5" fill="#c8d0dc"/>
  <!-- Checkmark circle - completed item -->
  <circle cx="52" cy="36" r="10" fill="url(#checkGrad)" stroke="#4ab89a" stroke-width="0.5"/>
  <path d="M47 36 L50 39 L58 31" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Subtle shadow under clipboard -->
  <ellipse cx="40" cy="76" rx="28" ry="4" fill="rgba(100,120,140,0.15)"/>
</svg>
