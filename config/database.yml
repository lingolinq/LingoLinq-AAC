development:
  adapter: postgresql
  encoding: unicode
  database: lingolinq_development
  pool: 5
  timeout: 5000
  <% if ENV['DATABASE_URL'] %>
  url: <%= ENV['DATABASE_URL'] %>
  <% end %>

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
<% if ENV['DATABASE_URL'] && !ENV['DATABASE_URL'].empty? %>
test:
  adapter: postgresql
  encoding: unicode
  database: lingolinq_test
  pool: 5
  timeout: 5000
  url: <%= ENV['DATABASE_URL'].gsub('lingolinq_development', 'lingolinq_test') %>
<% else %>
test:
  adapter: sqlite3
  database: ':memory:'
  pool: 5
  timeout: 5000
<% end %>

production:
  primary: 
    adapter: postgresql
    url: <%= ENV['DATABASE_URL'] || ENV['LEADER_POSTGRES_URL'] %>
    pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
    timeout: 5000
<% if false %>
  # TODO: see shards.yml for examples of how to process follower
  primary_replica: 
    adapter: postgresql
    url: <%= ENV['DATABASE_URL'] || ENV['LEADER_POSTGRES_URL'] %>
    pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
    timeout: 5000
    replica: true
<% end %>
