# LingoLinq AAC - Fly.io Deployment Configuration
# Uses canonical Dockerfile with health check fixes

app = "lingolinq-aac"
primary_region = "ord"

[build]
  # Use single-stage Dockerfile to eliminate bundler version mismatch
  dockerfile = "Dockerfile"

[env]
  # Rails environment
  RAILS_ENV = "production"
  RACK_ENV = "production"
  RAILS_SERVE_STATIC_FILES = "true"
  RAILS_LOG_TO_STDOUT = "true"

  # Bundle configuration
  BUNDLE_DEPLOYMENT = "false"
  BUNDLE_PATH = "/usr/local/bundle"
  BUNDLE_FORCE_RUBY_PLATFORM = "false"
  BUNDLE_WITHOUT = "development:test"

  # App configuration
  DEFAULT_HOST = "lingolinq-aac.fly.dev"
  DEFAULT_EMAIL_FROM = "noreply@lingolinq.com"
  SYSTEM_ERROR_EMAIL = "errors@lingolinq.com"
  NEW_REGISTRATION_EMAIL = "registrations@lingolinq.com"
  MAX_FILE_SIZE = "25000000"  # 25MB max upload size
  NEW_RELIC_AGENT_ENABLED = "false"

  # Node environment
  NODE_ENV = "production"

[[services]]
  protocol = "tcp"
  internal_port = 3000
  processes = ["app"]

  [services.concurrency]
    type = "requests"
    hard_limit = 100
    soft_limit = 50

  [[services.ports]]
    force_https = true
    handlers = ["http"]
    port = 80
    
  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.http_checks]]
    grace_period = "90s"
    interval = "30s"
    method = "GET"
    timeout = "10s"
    path = "/health"

# Machine resources
[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

# Note: Database connection via DATABASE_URL secret
# Set with: flyctl secrets set DATABASE_URL=postgres://...
