# LingoLinq AAC - Fly.io Deployment Configuration
# Uses Fly.io buildpacks with health check fixes

app = "lingolinq-aac"
primary_region = "ord"

[build]
  builder = "heroku/buildpacks:20"

[deploy]
  # Run database migrations once during deployment, before starting new containers
  # This ensures migrations complete successfully before the app starts serving traffic
  release_command = "bundle exec rake db:migrate"

[env]
  # Rails environment
  RAILS_ENV = "production"
  RACK_ENV = "production"
  RAILS_SERVE_STATIC_FILES = "true"
  RAILS_LOG_TO_STDOUT = "true"

  # Explicitly set PORT to match internal_port
  # This ensures Puma binds to the correct port that Fly.io expects
  PORT = "3000"

  # Bundle configuration
  BUNDLE_DEPLOYMENT = "false"
  BUNDLE_FORCE_RUBY_PLATFORM = "false"
  BUNDLE_WITHOUT = "development:test"

  # OBF gem configuration
  # Critical: This must be set for release_command (migrations) to work
  # The obf gem is excluded from production but initializers still check for it
  DISABLE_OBF_GEM = "true"

  # App configuration
  DEFAULT_HOST = "lingolinq-aac.fly.dev"
  DEFAULT_EMAIL_FROM = "noreply@lingolinq.com"
  SYSTEM_ERROR_EMAIL = "errors@lingolinq.com"
  NEW_REGISTRATION_EMAIL = "registrations@lingolinq.com"
  MAX_FILE_SIZE = "25000000"  # 25MB max upload size
  NEW_RELIC_AGENT_ENABLED = "false"

  # Node environment
  NODE_ENV = "production"

[[services]]
  protocol = "tcp"
  internal_port = 3000
  processes = ["app"]

  [services.concurrency]
    type = "requests"
    hard_limit = 100
    soft_limit = 50

  [[services.ports]]
    force_https = true
    handlers = ["http"]
    port = 80
    
  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.http_checks]]
    grace_period = "120s"
    interval = "30s"
    method = "GET"
    timeout = "10s"
    path = "/health"
    
  [[services.tcp_checks]]
    grace_period = "30s"
    interval = "15s"
    timeout = "5s"

# Machine resources
[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

# Note: Database connection via DATABASE_URL secret
# Set with: flyctl secrets set DATABASE_URL=postgres://...
